services:
  photo-backup-organizer:
    image: nbrouwers/photo-backup-organizer:latest
    platform: linux/amd64   # Intel Celeron J4025 (x86-64)
    container_name: photo-backup-organizer
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Configuration file (read-only inside the container)
      - ./config:/config:ro
      # Phone backup source folders – must be writable so files can be moved out
      - /volume1/homes/Alice/MobileBackup:/backups/alice:rw
      - /volume1/homes/Bob/MobileBackup:/backups/bob:rw
      # Central photo and video library roots
      - /volume1/photo:/photos:rw
      - /volume1/video:/videos:rw
      # Persistent audit log (relative to docker-compose.yml location)
      - ./logs:/logs:rw
      # Thumbnail / poster-frame cache (ephemeral; safe to delete)
      - ./cache:/cache:rw
    environment:
      - PHOTO_BACKUP_CONFIG=/config/config.yaml
    # Keep memory usage within NAS constraints (NFR-07)
    mem_limit: 512m
    memswap_limit: 512m
