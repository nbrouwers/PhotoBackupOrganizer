services:
  photo-backup-organizer:
    # ── Image selection ─────────────────────────────────────────────────────
    # For local development / testing, build from source:
    build:
      context: .
      dockerfile: Dockerfile
    # For NAS deployment, pull the pre-built multi-platform image instead:
    # image: ghcr.io/<owner>/photo-backup-organizer:latest
    image: ${IMAGE:-photo-backup-organizer:latest}
    # ── Platform selector ───────────────────────────────────────────────────
    # Set COMPOSE_PLATFORM in your environment or .env file to match your NAS:
    #   linux/amd64  — Intel/AMD Synology (DS220+, DS420+, DS720+, DS920+, DS923+)
    #   linux/arm64  — ARM64 Synology     (DS223j, DS423j — Realtek RTD1619B)
    #   linux/arm/v7 — ARMv7 Synology     (older value-line models)
    platform: ${COMPOSE_PLATFORM:-linux/amd64}
    container_name: photo-backup-organizer
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Configuration file (read-only inside the container)
      - ./config:/config:ro
      # Phone backup source folders – must be writable so files can be moved out
      - /volume1/backups:/backups:rw
      # Central photo and video library roots
      - /volume1/photos:/photos:rw
      - /volume1/videos:/videos:rw
      # Persistent audit log
      - /volume1/logs/photo-backup-organizer:/logs:rw
      # Thumbnail / poster-frame cache (ephemeral; safe to delete)
      - photo-backup-cache:/cache:rw
    environment:
      - PHOTO_BACKUP_CONFIG=/config/config.yaml
    # Keep memory usage within NAS constraints (NFR-07)
    mem_limit: 512m
    memswap_limit: 512m

volumes:
  photo-backup-cache:
