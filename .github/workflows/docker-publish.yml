# CI/CD pipeline for Photo Backup Organizer
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Job 1 — test   : Install Python deps and run the full pytest suite     │
# │  Job 2 — build  : Build Docker image and publish                        │
# │                   (only runs when tests pass; skipped on forks)         │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Platform: linux/amd64 (Intel Celeron J4025 — x86-64)
#
# Registries:
#   GitHub Container Registry (GHCR) — always enabled, no secrets required.
#     Pull image: docker pull ghcr.io/<owner>/photo-backup-organizer:latest
#
#   Docker Hub — enabled when the following repository secrets are set:
#     DOCKERHUB_USERNAME : your Docker Hub username
#     DOCKERHUB_TOKEN    : a Docker Hub access token (not your password)
#     → Settings → Secrets and variables → Actions → New repository secret
#     Pull image: docker pull <DOCKERHUB_USERNAME>/photo-backup-organizer:latest

name: CI — Test, Build & Publish

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:   # allows manual runs from the GitHub Actions tab

# Cancel in-progress runs for the same branch/PR when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Run the test suite ──────────────────────────────────────────────
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]   # add "3.11", "3.10" here to test multiple versions

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ── Job 2: Build & publish Docker image ───────────────────────────────────
  build:
    name: Build & publish Docker image
    runs-on: ubuntu-latest
    needs: test   # only runs when all test jobs pass

    permissions:
      contents: read
      packages: write   # allows pushing to GHCR

    # Secrets cannot be referenced in `if:` conditions, so they are exposed
    # as job-level env vars that the `if:` expressions CAN read.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry logins ──────────────────────────────────────────────────
      # GHCR: uses the automatic GITHUB_TOKEN — no secrets setup required
      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub: only runs when DOCKERHUB_TOKEN secret is configured
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Build the registry image list dynamically so Docker Hub is only
      # included when the DOCKERHUB_USERNAME secret is actually set
      - name: Compute registry targets
        id: registries
        run: |
          IMAGES="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ -n "${DOCKERHUB_USERNAME}" ]]; then
            IMAGES="${IMAGES}"$'\n'"${DOCKERHUB_USERNAME}/photo-backup-organizer"
          fi
          echo "images<<EOF" >> "$GITHUB_OUTPUT"
          echo "${IMAGES}"  >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}

      # Generates tags:  latest / branch-name / vX.Y / vX.Y.Z / sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # layer cache is shared across runs — greatly speeds up subsequent builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
