# Builds and publishes a multi-platform Docker image to GitHub Container Registry
# on every push to main and on version tags (v*).
#
# Platforms built:
#   linux/amd64   — Intel/AMD Synology (DS220+, DS420+, DS720+, DS920+, DS923+)
#   linux/arm64   — ARM64 Synology     (DS223j, DS423j — Realtek RTD1619B)
#   linux/arm/v7  — ARMv7 Synology     (older value-line models)
#
# The published image is available at:
#   ghcr.io/<owner>/photo-backup-organizer:<tag>

name: Build & Publish Docker Image

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # QEMU lets the x86 runner execute ARM binaries during the build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates tags:  latest / branch-name / vX.Y / vX.Y.Z / sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache speeds up repeated builds significantly
          cache-from: type=gha
          cache-to:   type=gha,mode=max
